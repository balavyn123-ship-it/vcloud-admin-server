<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VclouD — Адмін панель</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 48px; width: 380px; text-align: center; }
    .login-box h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
    .login-box p  { color: #888; margin-bottom: 32px; }
    #adminScreen { display: none; }
    header { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 22px; color: #fff; }
    .main { max-width: 960px; margin: 40px auto; padding: 0 24px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 32px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 6px; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; color: #888; border: none; background: none; transition: all .2s; }
    .tab.active { background: #6c63ff; color: #fff; }
    .add-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 32px; margin-bottom: 40px; }
    .add-card h2 { font-size: 20px; margin-bottom: 24px; color: #fff; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-full { grid-column: 1 / -1; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    input { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 15px; transition: border-color .2s; }
    input:focus { outline: none; border-color: #6c63ff; }
    input::placeholder { color: #444; }
    .log { display: none; background: #0a0a14; border: 1px solid #2a2a4a; border-radius: 10px; padding: 16px; margin: 16px 0; font-family: monospace; font-size: 14px; min-height: 80px; }
    .log-line { padding: 3px 0; }
    .log-line.ok   { color: #2ecc71; }
    .log-line.warn { color: #f39c12; }
    .log-line.err  { color: #e74c3c; }
    .preview { display: none; background: #0f0f1a; border: 1px solid #2ecc71; border-radius: 12px; padding: 16px; margin: 16px 0; flex-direction: row; gap: 16px; align-items: center; }
    .preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
    .preview-info h3 { color: #fff; font-size: 16px; }
    .preview-info p  { color: #888; font-size: 13px; margin-top: 4px; }
    .btn { padding: 13px 28px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #6c63ff; color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-danger { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; padding: 7px 14px; font-size: 13px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
    .btn-danger:hover { background: #e74c3c33; }
    .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title h2 { font-size: 20px; color: #fff; }
    .count-badge { background: #6c63ff22; color: #6c63ff; padding: 4px 14px; border-radius: 20px; font-size: 14px; }
    .search-bar { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 10px 16px; color: #fff; font-size: 14px; width: 100%; margin-bottom: 16px; }
    .search-bar:focus { outline: none; border-color: #6c63ff; }
    .product-list { display: flex; flex-direction: column; gap: 10px; }
    .product-item { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 14px 16px; display: flex; gap: 14px; align-items: center; }
    .product-item:hover { border-color: #6c63ff44; }
    .product-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; background: #0f0f1a; flex-shrink: 0; }
    .product-item .info { flex: 1; min-width: 0; }
    .product-item .info h3 { color: #fff; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-item .info p  { color: #666; font-size: 11px; margin-top: 3px; }
    .product-item .price { color: #6c63ff; font-weight: 700; font-size: 15px; white-space: nowrap; margin: 0 8px; flex-shrink: 0; }
    .stock-wrap { display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
    .sbtn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #2a2a4a; background: #0f0f1a; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
    .sbtn:hover { border-color: #6c63ff; color: #6c63ff; }
    .sval { min-width: 40px; text-align: center; font-size: 13px; font-weight: 700; border: 1px solid #2a2a4a; border-radius: 6px; padding: 3px 5px; background: #0f0f1a; cursor: pointer; }
    .sval:hover { border-color: #6c63ff; }
    .sadd { font-size: 11px; color: #555; cursor: pointer; border: 1px dashed #2a2a4a; border-radius: 6px; padding: 3px 8px; }
    .sadd:hover { border-color: #6c63ff; color: #6c63ff; }
    .s0 { color: #e74c3c; }
    .s1 { color: #f39c12; }
    .s2 { color: #2ecc71; }
    .aok  { color: #2ecc71; }
    .awk  { color: #f39c12; }
    .aer  { color: #e74c3c; }
    .empty { text-align: center; color: #444; padding: 60px 0; font-size: 16px; }
    .site-link { display: inline-flex; align-items: center; gap: 8px; color: #6c63ff; text-decoration: none; font-size: 14px; padding: 8px 16px; border: 1px solid #6c63ff44; border-radius: 8px; }
    .site-link:hover { background: #6c63ff11; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.show { display: flex; }
    .modal { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 28px; width: 340px; }
    .modal h3 { color: #fff; font-size: 18px; margin-bottom: 8px; }
    .modal .sub { color: #888; font-size: 13px; margin-bottom: 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal input { margin-bottom: 16px; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-outline { background: none; border: 1px solid #2a2a4a; color: #888; border-radius: 10px; padding: 12px; font-size: 15px; cursor: pointer; flex: 1; }
    .btn-outline:hover { border-color: #6c63ff; color: #fff; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>VclouD</h1>
    <p>Адмін панель магазину</p>
    <div style="margin-bottom:16px">
      <label>Пароль</label>
      <input type="password" id="pwInput" placeholder="Введи пароль..." onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary" onclick="login()">Увійти</button>
    <p id="loginErr" style="color:#e74c3c;margin-top:12px;font-size:14px"></p>
  </div>
</div>

<div id="adminScreen">
  <header>
    <h1>VclouD Admin</h1>
    <div style="display:flex;gap:16px;align-items:center">
      <a href="https://vcloud-v2.netlify.app" target="_blank" class="site-link">Сайт</a>
      <span id="hCount" style="color:#888;font-size:14px"></span>
    </div>
  </header>

  <div class="main">
    <div class="tabs">
      <button class="tab active" id="t0" onclick="tab('add')">Додати товар</button>
      <button class="tab" id="t1" onclick="tab('list')">Каталог</button>
    </div>

    <div id="tabAdd">
      <div class="add-card">
        <h2>Новий товар</h2>
        <div class="form-grid">
          <div><label>Назва *</label><input id="iTitle" placeholder="Nike Air Max 90..."></div>
          <div><label>Ціна (грн) *</label><input type="number" id="iPrice" placeholder="2500"></div>
          <div><label>Кількість (шт)</label><input type="number" id="iStock" placeholder="3 або порожньо" min="0"></div>
          <div></div>
          <div class="form-full"><label>Посилання (необов'язково)</label><input type="url" id="iUrl" placeholder="https://rozetka.com.ua/..."></div>
        </div>
        <div class="log" id="logBox"></div>
        <div class="preview" id="prevBox">
          <img id="prevImg" src="" alt="">
          <div class="preview-info"><h3 id="prevTitle"></h3><p id="prevAI"></p></div>
        </div>
        <button class="btn btn-primary" id="addBtn" onclick="addProduct()">Додати товар на сайт</button>
      </div>
    </div>

    <div id="tabList" style="display:none">
      <div class="section-title">
        <h2>Каталог</h2>
        <span class="count-badge" id="cBadge">...</span>
      </div>
      <input class="search-bar" placeholder="Пошук..." oninput="filt(this.value)">
      <div class="product-list" id="pList"><div class="empty">Завантаження...</div></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="mBg" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <h3>Кількість товару</h3>
    <p class="sub" id="mName"></p>
    <label>Нова кількість (порожньо = не вказано)</label>
    <input type="number" id="mInput" min="0" onkeydown="if(event.key==='Enter')saveM()">
    <div class="modal-btns">
      <button class="btn-outline" onclick="closeM()">Скасувати</button>
      <button class="btn btn-primary" style="width:auto;flex:1" onclick="saveM()">Зберегти</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let tok = localStorage.getItem("vt") || "";
let all = [];
let mId = null;

async function login() {
  const pass = document.getElementById("pwInput").value;
  const r = await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})});
  const d = await r.json();
  if(d.ok){tok=d.token;localStorage.setItem("vt",tok);show();}
  else document.getElementById("loginErr").textContent="Невірний пароль";
}
function show(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("adminScreen").style.display="block";
  load();
}
if(tok)show();

function tab(t){
  document.getElementById("tabAdd").style.display=t==="add"?"block":"none";
  document.getElementById("tabList").style.display=t==="list"?"block":"none";
  document.getElementById("t0").classList.toggle("active",t==="add");
  document.getElementById("t1").classList.toggle("active",t==="list");
  if(t==="list")load();
}

async function load(){
  const r=await fetch(API+"/api/products",{headers:{Authorization:"Bearer "+tok}});
  if(r.status===401){tok="";localStorage.removeItem("vt");location.reload();return;}
  const d=await r.json();
  all=d.products||[];
  render(all);
  cnt(all.length);
}
function cnt(n){document.getElementById("cBadge").textContent=n+" товарів";document.getElementById("hCount").textContent=n+" товарів";}
function filt(q){render(all.filter(p=>(p.title||"").toLowerCase().includes(q.toLowerCase())));}

function render(list){
  const el=document.getElementById("pList");
  if(!list.length){el.innerHTML='<div class="empty">Немає товарів</div>';return;}
  el.innerHTML=list.map(p=>row(p)).join("");
}

function sHtml(p){
  const s=p.stock;
  if(s===null||s===undefined) return '<span class="sadd" onclick="openM('+p.id+',\''+esc(p.title)+'\',null)">+ наявність</span>';
  const c=s===0?"s0":s<=2?"s1":"s2";
  const l=s===0?"Немає":s+" шт";
  return '<div class="stock-wrap"><button class="sbtn" onclick="chg('+p.id+',-1)">-</button><span class="sval '+c+'" onclick="openM('+p.id+',\''+esc(p.title)+'\','+s+')">'+l+'</span><button class="sbtn" onclick="chg('+p.id+',1)">+</button></div>';
}

function row(p){
  const price=(p.price||0).toLocaleString("uk-UA");
  const ai=p.ai_check||"";
  const ac=ai.includes("ok")||ai.includes("правильно")?"aok":ai.includes("можливо")?"awk":"aer";
  return '<div class="product-item" id="pi'+p.id+'">'+
    '<img src="'+(p.image||"")+'" onerror="this.style.visibility=\'hidden\'" alt="">'+
    '<div class="info"><h3 title="'+esc(p.title)+'">'+p.title+'</h3>'+
    '<p class="'+ac+'">'+ai+' · '+(p.category||"")+" · "+(p.date||"")+"</p></div>"+
    '<span class="price">'+price+" грн</span>"+
    sHtml(p)+
    '<button class="btn-danger" onclick="del('+p.id+')">x</button>'+
    "</div>";
}

function esc(s){return(s||"").replace(/'/g,"&#39;");}

async function chg(id,delta){
  const r=await fetch(API+"/api/products/"+id+"/stock",{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},body:JSON.stringify({delta})});
  const d=await r.json();
  if(d.ok){
    const p=all.find(x=>x.id===id);
    if(p)p.stock=d.stock;
    const el=document.getElementById("pi"+id);
    if(el&&p){const sw=el.querySelector(".stock-wrap,.sadd");if(sw)sw.outerHTML=sHtml(p);}
  }
}

function openM(id,title,cur){
  mId=id;
  document.getElementById("mName").textContent=title;
  document.getElementById("mInput").value=cur!==null&&cur!==undefined?cur:"";
  document.getElementById("mBg").classList.add("show");
  setTimeout(()=>document.getElementById("mInput").focus(),50);
}
function closeM(){document.getElementById("mBg").classList.remove("show");mId=null;}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeM();});

async function saveM(){
  const v=document.getElementById("mInput").value;
  const stock=v===""?null:Number(v);
  const r=await fetch(API+"/api/products/"+mId+"/stock",{method:"PATCH",headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},body:JSON.stringify({stock})});
  const d=await r.json();
  if(d.ok){const p=all.find(x=>x.id===mId);if(p)p.stock=d.stock;closeM();render(all);}
}

async function del(id){
  const p=all.find(x=>x.id===id);
  if(!confirm("Видалити: "+(p?p.title:id)+"?"))return;
  const el=document.getElementById("pi"+id);
  if(el){el.style.opacity=".3";el.style.pointerEvents="none";}
  const r=await fetch(API+"/api/products/"+id,{method:"DELETE",headers:{Authorization:"Bearer "+tok}});
  if(r.ok){all=all.filter(x=>x.id!==id);render(all);cnt(all.length);}
}

async function addProduct(){
  const title=document.getElementById("iTitle").value.trim();
  const price=document.getElementById("iPrice").value.trim();
  const url=document.getElementById("iUrl").value.trim();
  const sv=document.getElementById("iStock").value.trim();
  const stock=sv===""?null:Number(sv);
  if(!title||!price){alert("Введи назву і ціну!");return;}

  const btn=document.getElementById("addBtn");
  btn.disabled=true;btn.textContent="Обробляю...";
  const lb=document.getElementById("logBox");
  const pb=document.getElementById("prevBox");
  lb.style.display="block";pb.style.display="none";lb.innerHTML="";

  function log(msg){
    const cls=msg.includes("ok")||msg.includes("збережено")||msg.includes("оновлено")?"ok":msg.includes("warn")||msg.includes("можливо")?"warn":msg.includes("err")||msg.includes("Помилка")?"err":"";
    lb.innerHTML+='<div class="log-line '+cls+'">'+msg+'</div>';
    lb.scrollTop=lb.scrollHeight;
  }

  try{
    const r=await fetch(API+"/api/products",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},body:JSON.stringify({title,price:Number(price),url,stock})});
    const reader=r.body.getReader();const dec=new TextDecoder();let buf="";
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data: "))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          log(ev.message);
          if(ev.step==="done"&&ev.product){
            const p=ev.product;
            pb.style.display="flex";
            document.getElementById("prevImg").src=p.image||"";
            document.getElementById("prevTitle").textContent=p.title;
            document.getElementById("prevAI").textContent=p.ai_check||"";
            ["iTitle","iPrice","iUrl","iStock"].forEach(id=>document.getElementById(id).value="");
          }
        }catch{}
      }
    }
  }catch(e){log("Помилка: "+e.message);}

  btn.disabled=false;btn.textContent="Додати товар на сайт";
  load();
}
</script>
</body>
</html>
